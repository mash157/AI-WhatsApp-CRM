<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="description" content="Premium AI-Powered WhatsApp Business Automation CRM - Streamline customer communications, automate workflows, and boost sales with intelligent WhatsApp integration." />
    <meta name="keywords" content="WhatsApp CRM, Business Automation, AI, Chat Automation, Customer Management, WhatsApp Business" />
    <meta name="author" content="WhatsApp CRM Team" />
    <meta property="og:title" content="AI WhatsApp CRM - Business Automation Platform" />
    <meta property="og:description" content="Premium CRM for WhatsApp Business automation with AI-powered features" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WhatsApp CRM" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>AI WhatsApp CRM - Premium Business Automation</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #e2e8f0 100%);
        min-height: 100vh;
      }
      #root {
        min-height: 100vh;
      }
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #e2e8f0 100%);
        font-family: 'Inter', sans-serif;
      }
      .loader {
        text-align: center;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(59, 130, 246, 0.2);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loader-text {
        color: #1e293b;
        font-size: 16px;
        font-weight: 500;
      }
      .loader-subtext {
        color: #64748b;
        font-size: 14px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #e2e8f0 100%); font-family: 'Inter', sans-serif;">
        <div style="text-align: center; color: #1e293b;">
          <h1 style="font-size: 28px; margin-bottom: 10px;">⚠️ JavaScript Required</h1>
          <p style="color: #64748b; font-size: 16px;">Please enable JavaScript to run this application.</p>
        </div>
      </div>
    </noscript>
    <div id="root">
      <div class="loading">
        <div class="loader">
          <div class="spinner"></div>
          <div class="loader-text">Loading WhatsApp CRM...</div>
          <div class="loader-subtext">Premium Business Automation Platform</div>
        </div>
      </div>
    </div>
  </body>
</html>
